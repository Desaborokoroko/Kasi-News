{% extends "blog/base.html"%}
{% block content %}
<h2>{{category.name}}</h2>
{% for post in posts %}
<h3>
    <a href="{%url 'post_detail' post.id%}">
        {{post.title}}
    </a>
</h3>
<p>{{post.content|truncatewords:25}}</p>
<hr>
{%empty%}
<p>No posts in this category yet.</p>
{%endfor%}
{%endblock%}
