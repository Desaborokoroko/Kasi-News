{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>KASI NEWS/ALEX</title>
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <link rel="stylesheet" href="{% static 'blog/css/style.css'%}">
    </head>

    <body>
        <header class="site-header">
            <div class="header-content">
                <div class="logo-area">
                    <img src="{%static 'images/logo.png'%}" alt="Kasi News Logo">
            <h1>
                KASI NEWS
            </h1>
        </div>
            <nav class = "main-nav">
                <a href="{%url 'home' %}">Home</a>
                {% for category in categories %}
                <a href ="/category/{{category.id}}">{{category.name}}</a>
                {%endfor%}
            </nav>
        </div>
        </header>
        <main class="main-content">
            <div class="container">
                {% block content %}
                {% endblock %}
            </div>
        </main>
        <footer class="site-footer">
            <div class="footer-container">
                <p>@ 2026 Kasi News | Built in Alex</p>
                <p>Promoting Kasi Sports,Art,Events Opportunities</p>
        </footer>
    </body>
    </html>
